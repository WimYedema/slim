<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#e8e0d0" />
    <title>Slim — Lean PO Planning</title>
    <meta name="description" content="Free serverless lean planning tool for product owners. Manage the workflow before the sprint board. No signup, no server — P2P via WebRTC." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* — Colors — */
        --c-bg:          #e8e0d0;
        --c-surface:     #f5f0e6;
        --c-surface-alt: #f0e8d8;
        --c-text:        #3a3530;
        --c-text-soft:   #6a6050;
        --c-text-muted:  #8a8070;
        --c-text-faint:  #a09880;
        --c-text-ghost:  #9a9080;
        --c-border:      #c0b89a;
        --c-border-soft: #b0a890;

        --c-accent:       #3b7dd8;
        --c-accent-text:  #2a5090;
        --c-accent-border:#8a9ab0;
        --c-accent-bg:    rgba(59, 125, 216, 0.2);
        --c-accent-bg-hover: rgba(59, 125, 216, 0.35);

        --c-green:        #4a6a40;
        --c-green-border: #8aaa7a;
        --c-green-bg:     rgba(90, 140, 80, 0.2);
        --c-green-bg-hover: rgba(90, 140, 80, 0.35);
        --c-green-signal: #3a7a3a;

        --c-warm:         #8a7040;
        --c-warm-border:  #c0a870;
        --c-warm-bg:      rgba(180, 140, 60, 0.15);

        --c-red:          #7a3030;
        --c-red-bg:       rgba(181, 107, 107, 0.2);
        --c-red-border:   #b56b6b;
        --c-danger:       #8a3020;
        --c-danger-bg:    rgba(180, 80, 60, 0.2);

        --c-neutral-bg:       rgba(210, 200, 180, 0.35);
        --c-neutral-bg-hover: rgba(210, 200, 180, 0.45);
        --c-neutral-bg-light: rgba(210, 200, 180, 0.2);
        --c-neutral-text:     #6a6050;

        --c-overlay:      rgba(58, 53, 48, 0.5);
        --c-overlay-light:rgba(245, 240, 230, 0.85);

        /* — Horizon palette (structural, not semantic) — */
        --c-structure: #6a7a8a;
        --c-horizon-0: #8a7040;
        --c-horizon-1: #5a7a8a;
        --c-horizon-2: #7a6a8a;
        --c-horizon-3: #6a8a6a;

        /* — Typography — */
        --font:         system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        --font-reading: 'Lora', Georgia, serif;
        --fs-3xs:  0.6rem;
        --fs-2xs:  0.7rem;
        --fs-xs:   0.8rem;
        --fs-sm:   0.85rem;
        --fs-base: 1rem;
        --fs-md:   1.05rem;
        --fs-lg:   1.1rem;
        --fs-xl:   1.3rem;
        --fs-2xl:  1.6rem;
        --fs-3xl:  1.8rem;

        --lh-tight:   1;
        --lh-normal:  1.4;
        --lh-relaxed: 1.6;

        --fw-normal: 400;
        --fw-medium: 600;
        --fw-bold:   700;

        /* — Spacing — */
        --sp-3xs: 1px;
        --sp-2xs: 2px;
        --sp-xs:  4px;
        --sp-sm:  8px;
        --sp-md:  12px;
        --sp-lg:  16px;
        --sp-xl:  20px;
        --sp-2xl: 24px;

        /* — Borders & Radii — */
        --radius-sm:   3px;
        --radius-md:   6px;
        --radius-lg:   20px;
        --radius-full: 50%;

        /* — Shadows — */
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 3px 12px rgba(0, 0, 0, 0.12);
        --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.15);

        /* — Dot / pip sizes — */
        --dot-size:    17px;
        --dot-size-md: 14px;
        --dot-size-sm: 12px;
        --dot-size-xs: 10px;

        /* — Opacity levels for color-mix — */
        --opacity-subtle:   8%;
        --opacity-moderate: 15%;
        --opacity-emphasis: 30%;
        --opacity-strong:   50%;

        /* — Stage colors — */
        --c-stage-explore:   var(--c-text-ghost);
        --c-stage-sketch:    var(--c-warm);
        --c-stage-validate:  var(--c-accent);
        --c-stage-decompose: var(--c-green-signal);

        /* — Transitions — */
        --tr-fast:   0.15s;
        --tr-normal: 0.2s;
        --tr-slow:   0.3s;
      }

      @media (prefers-reduced-motion: reduce) {
        :root {
          --tr-fast: 0s;
          --tr-normal: 0s;
          --tr-slow: 0s;
        }
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }

      /* — Global focus ring — */
      :focus-visible {
        outline: 2px solid var(--c-accent);
        outline-offset: 2px;
      }

      /* Inputs use a subtler indicator (border glow) */
      input:focus-visible,
      textarea:focus-visible,
      select:focus-visible {
        outline: none;
        border-color: var(--c-accent);
        box-shadow: 0 0 0 2px var(--c-accent-bg);
      }

      /* — Button variants — */
      .btn-ghost,
      .btn-solid,
      .btn-icon {
        font-family: inherit;
        cursor: pointer;
        transition: background var(--tr-fast), color var(--tr-fast), border-color var(--tr-fast);
      }

      .btn-ghost {
        background: none;
        border: none;
        padding: 2px var(--sp-xs);
        border-radius: var(--radius-sm);
        font-size: var(--fs-xs);
        color: var(--c-text-muted);
      }

      .btn-ghost:hover {
        background: var(--c-neutral-bg-light);
        color: var(--c-text);
      }

      .btn-solid {
        border: 1px solid var(--c-border);
        padding: 2px var(--sp-sm);
        border-radius: var(--radius-sm);
        font-size: var(--fs-xs);
        background: var(--c-surface);
        color: var(--c-text-soft);
      }

      .btn-solid:hover {
        background: var(--c-neutral-bg-hover);
        border-color: var(--c-text-ghost);
      }

      .btn-icon {
        background: none;
        border: none;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--c-text-ghost);
        line-height: var(--lh-tight);
      }

      .btn-icon:hover {
        color: var(--c-text);
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: var(--c-overlay);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 20;
      }

      .dialog {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-lg);
        padding: var(--sp-lg);
        width: 90vw;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .dialog-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--sp-sm);
      }

      .dialog-header h2 {
        margin: 0;
        font-size: var(--fs-lg);
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: var(--sp-sm);
        padding: var(--sp-xs) var(--sp-sm);
        background: var(--c-surface-alt);
        border: 1px solid var(--c-border-soft);
        border-radius: var(--radius-sm);
        font-size: var(--fs-xs);
      }

      .toolbar-sep {
        width: 1px;
        align-self: stretch;
        background: var(--c-border-soft);
        margin: 2px 0;
      }

      .tab-bar {
        display: flex;
        gap: var(--sp-xs);
        align-items: center;
        margin-bottom: var(--sp-sm);
      }

      .tab {
        background: none;
        border: 1px solid var(--c-border-soft);
        font: inherit;
        font-size: var(--fs-sm);
        color: var(--c-text-muted);
        cursor: pointer;
        padding: var(--sp-xs) var(--sp-sm);
        border-radius: var(--radius-sm);
        transition: background var(--tr-fast), color var(--tr-fast), border-color var(--tr-fast);
      }

      .tab:hover {
        color: var(--c-text);
      }

      .tab.active {
        color: var(--c-text);
        font-weight: var(--fw-medium);
        background: var(--c-hover);
        border-color: var(--c-accent);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
